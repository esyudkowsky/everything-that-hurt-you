<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
@font-face {
  font-family: "Cinzel";
  src: url("/assets/fonts/cinzel.woff2") format("woff2");
  font-weight: 400 700; font-display: block;
}
:root {
  --vo: "Cinzel", "Palatino Linotype", Palatino, Georgia, serif;
  --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; }
.card {
  position: relative; width: 1200px; height: 630px;
  background: url("/assets/ui/ui_title.png") center 42% / cover no-repeat;
  display: flex; flex-direction: column; align-items: center;
}
/* legibility wash: darker at the top (title) and bottom (button) */
.card::before {
  content: ""; position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(#000a 0%, #0003 30%, #0000 52%, #0006 78%, #000d 100%);
}
.head { position: relative; z-index: 1; margin-top: 54px; text-align: center; padding: 0 48px; }
h1 {
  font-family: var(--vo); font-weight: 700; letter-spacing: 0.15em;
  font-size: 68px; line-height: 1.04; color: #eee7d6;
  text-shadow: 0 0 18px #000, 0 3px 9px #000;
}
.byline { position: relative; z-index: 1; margin-top: 22px; text-align: center; }
.byline .kind {
  font-family: var(--serif); font-style: italic;
  font-size: 37px; letter-spacing: 0.06em; color: #f2ead6;
  text-shadow: 0 0 8px #000, 0 0 18px #000c, 0 2px 6px #000;
}
.byline .author {
  display: block; margin-top: 10px;
  font-family: var(--vo); font-weight: 700;
  font-size: 44px; letter-spacing: 0.05em; color: #f6eed8;
  text-shadow: 0 0 8px #000, 0 0 18px #000c, 0 2px 6px #000;
}
.begin {
  position: relative; z-index: 1; margin-top: auto; margin-bottom: 64px;
  font-family: var(--serif); font-size: 33px; letter-spacing: 0.05em;
  padding: 15px 66px; color: #f0ead9;
  background: #14141ce6; border: 2px solid #c9a75aaa; border-radius: 13px;
  box-shadow: 0 8px 28px #000a;
}
.begin .tri { font-size: 24px; color: #e3c67c; margin-left: 14px; vertical-align: 2px; }
</style></head>
<body>
  <div class="card">
    <div class="head"><h1>EVERYTHING THAT&nbsp;HURT&nbsp;YOU</h1></div>
    <div class="byline">
      <span class="kind">a kinetic novel</span>
      <span class="author">Eliezer Yudkowsky</span>
    </div>
    <div class="begin">Begin<span class="tri">&#9654;</span></div>
  </div>
</body></html>
